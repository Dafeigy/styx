name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_suffix: linux-x86_64
            binary_name: clio
            use_cross: false

          - os: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            binary_name: clio
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
            binary_name: clio
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            binary_name: clio.exe
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build with cross (Linux musl)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --features openssl/vendored
        env:
          OPENSSL_STATIC: 1

      - name: Build (macOS / Windows)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../clio-${{ matrix.artifact_suffix }}.tar.gz ${{ matrix.binary_name }}
          cd ../../..
          sha256sum clio-${{ matrix.artifact_suffix }}.tar.gz > clio-${{ matrix.artifact_suffix }}.tar.gz.sha256

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target\${{ matrix.target }}\release
          Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath ..\..\..\clio-${{ matrix.artifact_suffix }}.zip
          cd ..\..\..
          $hash = (Get-FileHash -Algorithm SHA256 clio-${{ matrix.artifact_suffix }}.zip).Hash.ToLower()
          "$hash  clio-${{ matrix.artifact_suffix }}.zip" | Out-File -Encoding utf8 clio-${{ matrix.artifact_suffix }}.zip.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clio-${{ matrix.artifact_suffix }}.tar.gz*
            clio-${{ matrix.artifact_suffix }}.zip*
          generate_release_notes: true
